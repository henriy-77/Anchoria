[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SHARED_SECRET"

[functions]
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# Send the old form URLs to the current renamed pages
[[redirects]]
  from = "/accountopening.html"
  to = "/individualaccountopening.html"
  status = 301
  force = true

[[redirects]]
  from = "/corporate-opening.html"
  to = "/corporateaccountopening.html"
  status = 301
  force = true


[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/account-opening.html"
  [headers.values]
    # Allow embedding via iframe from the main Anchoria site
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors *"
